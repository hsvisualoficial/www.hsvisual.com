# ── HS Visual — Nginx Site Config ────────────────────────────────────
# Salvar em: /etc/nginx/sites-available/hsvisual.com
# Ativar:    ln -s /etc/nginx/sites-available/hsvisual.com /etc/nginx/sites-enabled/
# SSL:       certbot --nginx -d hsvisual.com -d www.hsvisual.com

# Redireciona HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name hsvisual.com www.hsvisual.com;
    return 301 https://hsvisual.com$request_uri;
}

# Redireciona www → sem www
server {
    listen 443 ssl http2;
    server_name www.hsvisual.com;

    ssl_certificate     /etc/letsencrypt/live/hsvisual.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hsvisual.com/privkey.pem;

    return 301 https://hsvisual.com$request_uri;
}

# Servidor principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hsvisual.com;

    ssl_certificate     /etc/letsencrypt/live/hsvisual.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hsvisual.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Logs
    access_log /var/log/nginx/hsvisual.access.log;
    error_log  /var/log/nginx/hsvisual.error.log;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # Cache de assets estáticos do Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy reverso para o Next.js (porta 3000)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
