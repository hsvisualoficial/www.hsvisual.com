server {
    listen 80;
    server_name hsvisual.com www.hsvisual.com;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                        always;
    add_header X-Frame-Options          "DENY"                           always;
    add_header X-XSS-Protection         "1; mode=block"                  always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Assets estáticos Next.js — cache longo (imutáveis) ────────────────
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── Imagens e fontes ───────────────────────────────────────────────────
    location ~* \.(ico|jpg|jpeg|png|gif|svg|webp|avif|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600";
        try_files $uri =404;
    }

    # ── Rota principal — SPA fallback ──────────────────────────────────────
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
